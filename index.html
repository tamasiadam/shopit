<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta author="Simplicity" />
    <meta name="viewport" content="width=, initial-scale=1.0" />
    <title>Shop It 🛒</title>
  </head>
  <link rel="stylesheet" href="styles.css" />

  <body>
    <main class="main">
      <header>
        <h1>BEVÁSÁRLÓLISTA</h1>
        <hr class="section-divider" />
      </header>

      <section>
        <table class="items-table">
          <thead>
            <tr>
              <th>Termék</th>
              <th>Mennyiség</th>
              <th>Ár</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="myTableBody"></tbody>
        </table>

        <button id="openModalBtn" onclick="openModal()">Hozzáadás</button>

        <div id="myModal" class="modal">
          <div class="modal-content">
            <h3>Termék leírása</h3>

            <input
              type="text"
              id="termek"
              placeholder="Termék neve"
            /><br /><br />
            <input
              type="text"
              id="mennyiseg"
              placeholder="Mennyiség"
            /><br /><br />
            <input type="text" id="ar" placeholder="Ár (ft)" /><br /><br />

            <button onclick="submitData()">Hozzáadás</button>
            <button onclick="closeModal()">Mégse</button>
          </div>
        </div>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
